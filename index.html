function MiniChart({ history, color }) {
  if (history.length < 2) return null;
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const W = 100, H = 28;
  const pts = history.map((v, i) => `${(i / (history.length - 1)) * W},${H - ((v - min) / range) * H}`).join(" ");
  return (
    <svg width={W} height={H} style={{ display: "block", marginTop: 6 }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} />
    </svg>
  );
}

// ============================================================
// TIME RING METER — circular SVG display for the sticky banner
// ============================================================

function TimeRingMeter({ hoursRemaining }) {
  const R = 22, STROKE = 4;
  const circ = 2 * Math.PI * R;
  const pct = Math.min(1, Math.max(0, hoursRemaining / TIME_BANK_HOURS));
  const dash = pct * circ;
  const color = getTimeColor(hoursRemaining);
  const displayHours = hoursRemaining % 1 === 0 ? hoursRemaining : hoursRemaining.toFixed(1);
  return (
    <div style={{ position: "relative", width: 54, height: 54, flexShrink: 0 }}>
      <svg width={54} height={54} style={{ transform: "rotate(-90deg)" }}>
        {/* Track */}
        <circle cx={27} cy={27} r={R} fill="none" stroke="var(--surface2)" strokeWidth={STROKE} />
        {/* Fill */}
        <circle cx={27} cy={27} r={R} fill="none" stroke={color}
          strokeWidth={STROKE} strokeLinecap="round"
          strokeDasharray={`${dash} ${circ}`}
          style={{ transition: "stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1), stroke 0.4s" }}
        />
      </svg>
      {/* Center label */}
      <div style={{
        position: "absolute", inset: 0, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", pointerEvents: "none"
      }}>
        <span style={{ color, fontWeight: 800, fontSize: 12, fontFamily: "'Syne', sans-serif", lineHeight: 1 }}>{displayHours}</span>
        <span style={{ color: "var(--faint)", fontSize: 8, lineHeight: 1, marginTop: 1 }}>hrs</span>
      </div>
    </div>
  );
}

            );
          })}
        </div>
      </div>

      {(child.savingsGoals || []).length > 0 && (

          {(child.savingsGoals || []).map(g => {

            return (
              <div key={g.id} style={{ marginBottom: 14 }}>

                </div>

                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Small self-contained component for setting a child's PIN
function ChildPinSetter({ child, updateChild, notify }) {
  const [newChildPin, setNewChildPin] = useState("");
  const [confirm, setConfirm] = useState("");
  const [step, setStep] = useState("enter"); // "enter" | "confirm"

  const handleDigit = (n) => {
    if (step === "enter") {
      if (newChildPin.length < 4) {
        const next = newChildPin + n;
        setNewChildPin(next);
        if (next.length === 4) setStep("confirm");
      }
    } else {
      if (confirm.length < 4) {
        const next = confirm + n;
        setConfirm(next);
        if (next.length === 4) {
          if (next === newChildPin) {
            updateChild(child.id, c => ({ ...c, childPin: next }));
            notify(`${child.name}'s PIN set! 🔒`);
            setNewChildPin(""); setConfirm(""); setStep("enter");
          } else {
            notify("PINs didn't match — try again.", "warn");
            setNewChildPin(""); setConfirm(""); setStep("enter");
          }
        }
      }
    }
  };

  const handleBack = () => {
    if (step === "confirm") { setConfirm(""); setStep("enter"); }
    else setNewChildPin(p => p.slice(0, -1));
  };

  const current = step === "enter" ? newChildPin : confirm;

  return (
    <div>
      <p style={{ color: "var(--faint)", fontSize: 12, marginBottom: 8 }}>
        {step === "enter" ? "Enter new PIN:" : "Confirm PIN:"}
      </p>
      <div style={{ ...S.pinDots, justifyContent: "flex-start", gap: 10, margin: "0 0 10px 0" }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{ ...S.pinDot, background: current.length > i ? "var(--green)" : "var(--surface2)", borderColor: current.length > i ? "var(--green)" : "var(--border2)" }} />
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 }}>
        {[1,2,3,4,5,6,7,8,9,0].map(n => (
          <button key={n} className="btn-hover"
            style={{ ...S.numKey, padding: "10px 6px", fontSize: 15 }}
            onClick={() => handleDigit(String(n))}>{n}</button>
        ))}
        <button className="btn-hover" style={{ ...S.numKey, padding: "10px 6px", fontSize: 13 }} onClick={handleBack}>⌫</button>
        {child.childPin && child.childPin !== "0000" && (
          <button className="btn-hover" style={{ ...S.btnSec, fontSize: 11, padding: "6px 4px" }}
            onClick={() => { updateChild(child.id, c => ({ ...c, childPin: "0000" })); notify(`${child.name}'s PIN removed.`, "warn"); setNewChildPin(""); setConfirm(""); setStep("enter"); }}>
            Clear
          </button>
        )}
      </div>
    </div>
  );
}

    const mults = {
      spike:    { min: 1.3, max: 2.0, label: "surged" },

    }));
    notify("Business removed.", "warn");
  };

  const triggerMarketEvent = (type, headline) => {
    const multipliers = {
      spike:    { min: 1.4, max: 2.2, label: "🚀 Market Spike",    color: "var(--green)", desc: "A news event caused investors to flood the market. Prices surged." },
      crash:    { min: 0.3, max: 0.6, label: "📉 Market Crash",    color: "var(--red)",   desc: "Panic selling hit the market. Prices dropped sharply." },
      volatile: { min: 0.5, max: 1.8, label: "🌪 High Volatility", color: "var(--amber)", desc: "Uncertainty caused wild price swings. Some stocks up, some down." },
    };

      const newPrices = { ...c.marketPrices };
      const newHistory = { ...c.stockHistory };
      targets.forEach(id => {

    notify(`Economy shifted: ${s.label}`);

                neutral: { label: "Neutral Market", icon: "↔️", color: "var(--amber)", bg: "var(--amber-lo)", border: "rgba(245,166,35,0.25)", desc: "Markets are mixed — no clear directional trend. Stocks are moving both up and down without a dominant pattern.", advice: "A good time to discuss diversification. When some stocks are up and others down, owning multiple stocks smooths out the ride." },

                  </div>
                </div>
              );
            })()}

              const tier = getCreditTier(c.creditScore || 700);
              const timeLeft = getTimeRemaining(c);
              const timeColor = getTimeColor(timeLeft);

              return (
                <div key={c.id} style={S.card}>

                            </div>
                          </div>
                        </div>

                    </div>

                      {/* Job Type Toggle */}

                          <button key={val} className="btn-hover" onClick={() => setJobType(val)}

                            {label}
                          </button>
                        ))}
                      </div>

                      <input style={S.input} placeholder="Job title (e.g. Take out trash)" value={jobTitle} onChange={e => setJobTitle(e.target.value)} />
                      <input style={S.input} placeholder="Description (optional)" value={jobDesc} onChange={e => setJobDesc(e.target.value)} />

                          </div>

                      </div>

                      {jobType === "one-time" && (
                        <div style={S.lessonBox}>
                          <p style={{ color: "var(--faint)", fontSize: 12, margin: 0 }}>

                          </p>
                        </div>
                      )}

                      <div style={{ display: "flex", gap: 8 }}>

                          <button className="btn-hover" style={S.btnSec} onClick={() => { setEditingJob(null); setJobTitle(""); setJobDesc(""); setJobPay(10); setJobCooldown(10); setJobType("recurring"); }}>

                    </div>
                  </div>
                </div>

                      <div style={S.sectionLabel}>Active Custom Businesses</div>

                            <div style={{ color: "var(--text)", fontWeight: 600, fontSize: 14 }}>{biz.name}</div>
                            <div style={{ color: "var(--muted)", fontSize: 12 }}>Cost ${biz.cost} · +${biz.incomePerCycle} {biz.cycleLabel}</div>

                      </div>
                    </div>
                    <div>
                      <label style={{ color: "var(--muted)", fontSize: 12 }}>Cycle time: <strong style={{ color: "var(--amber)" }}>{bizCycle} min</strong></label>

                              </>
                            )}
                          </div>
                        </div>
                      </div>

                  })}

                  {/* Custom liabilities */}
                  {(child?.customLiabilities || []).filter(l => !l.isDefaultOverride).length > 0 && (
                    <div style={{ marginTop: 16 }}>
                      <div style={S.sectionLabel}>Custom Expenses</div>
                      {(child?.customLiabilities || []).filter(l => !l.isDefaultOverride).map(liab => (

  btnSm:      { background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--muted)", borderRadius: "var(--radius-sm)", padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600, transition: "all 0.15s" },

  // Modal / overlay
  overlay:    { position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20, backdropFilter: "blur(4px)" },
  modal:      { background: "var(--surface)", border: "1px solid var(--border2)", borderRadius: "var(--radius-xl)", padding: 28, width: "100%", maxWidth: 320, animation: "popIn 0.28s cubic-bezier(0.34,1.56,0.64,1)" },
  modalTitle: { fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 20, marginBottom: 6, color: "var(--text)" },

  pinDot:     { width: 14, height: 14, borderRadius: "50%", border: "2px solid var(--border2)", transition: "background 0.15s, transform 0.15s" },
  numpad:     { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 },
  numKey:     { background: "var(--surface2)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: "var(--radius-sm)", padding: "14px", fontSize: 18, cursor: "pointer", fontWeight: 600, fontFamily: "'Syne', sans-serif", transition: "background 0.12s, transform 0.1s" },

  parentChildCard: { display: "flex", alignItems: "center", gap: 12, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: 14, marginBottom: 10 },
};
